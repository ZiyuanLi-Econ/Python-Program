<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" role="img" aria-labelledby="title desc">
  <title id="title">Strait of Hormuz share of global oil flows</title>
  <desc id="desc">A line chart comparing the Strait of Hormuz share of world maritime oil trade and world total oil supply from 2020 through the first half of 2025.</desc>
  <style>
    .title { fill: #24292f; font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .subtitle, .axis, .source { fill: #57606a; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .label { fill: #24292f; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .grid { stroke: #d0d7de; stroke-width: 1; }
    .maritime { stroke: #0969da; fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .supply { stroke: #bf8700; fill: none; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
    .maritime-dot { fill: #0969da; }
    .supply-dot { fill: #bf8700; }
    .maritime-text { fill: #0969da; font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .supply-text { fill: #9a6700; font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    @media (prefers-color-scheme: dark) {
      .title, .label { fill: #f0f6fc; }
      .subtitle, .axis, .source { fill: #8c959f; }
      .grid { stroke: #30363d; }
      .maritime { stroke: #58a6ff; }
      .supply { stroke: #d29922; }
      .maritime-dot, .maritime-text { fill: #58a6ff; }
      .supply-dot, .supply-text { fill: #d29922; }
    }
  </style>

  <text class="title" x="80" y="38">Strait of Hormuz share of global oil flows</text>
  <text class="subtitle" x="80" y="63">Annual averages; 1H25 is the first-half 2025 average</text>

  <g aria-hidden="true">
    <line class="grid" x1="90" y1="90" x2="780" y2="90"/>
    <line class="grid" x1="90" y1="140" x2="780" y2="140"/>
    <line class="grid" x1="90" y1="190" x2="780" y2="190"/>
    <line class="grid" x1="90" y1="240" x2="780" y2="240"/>
    <line class="grid" x1="90" y1="290" x2="780" y2="290"/>
    <line class="grid" x1="90" y1="340" x2="780" y2="340"/>
    <line class="grid" x1="90" y1="390" x2="780" y2="390"/>

    <text class="axis" x="65" y="95">30</text>
    <text class="axis" x="65" y="145">28</text>
    <text class="axis" x="65" y="195">26</text>
    <text class="axis" x="65" y="245">24</text>
    <text class="axis" x="65" y="295">22</text>
    <text class="axis" x="65" y="345">20</text>
    <text class="axis" x="65" y="395">18</text>
    <text class="axis" transform="translate(24 295) rotate(-90)">Share (%)</text>

    <text class="axis" x="104" y="420">2020</text>
    <text class="axis" x="234" y="420">2021</text>
    <text class="axis" x="364" y="420">2022</text>
    <text class="axis" x="494" y="420">2023</text>
    <text class="axis" x="624" y="420">2024</text>
    <text class="axis" x="750" y="420">1H25</text>
  </g>

  <polyline class="maritime" points="120,192.5 250,190 380,142.5 510,160 640,190 770,185"/>
  <polyline class="supply" points="120,330 250,325 380,295 510,310 640,340 770,340"/>

  <g aria-hidden="true">
    <circle class="maritime-dot" cx="120" cy="192.5" r="5"/>
    <circle class="maritime-dot" cx="250" cy="190" r="5"/>
    <circle class="maritime-dot" cx="380" cy="142.5" r="5"/>
    <circle class="maritime-dot" cx="510" cy="160" r="5"/>
    <circle class="maritime-dot" cx="640" cy="190" r="5"/>
    <circle class="maritime-dot" cx="770" cy="185" r="5"/>
    <circle class="supply-dot" cx="120" cy="330" r="5"/>
    <circle class="supply-dot" cx="250" cy="325" r="5"/>
    <circle class="supply-dot" cx="380" cy="295" r="5"/>
    <circle class="supply-dot" cx="510" cy="310" r="5"/>
    <circle class="supply-dot" cx="640" cy="340" r="5"/>
    <circle class="supply-dot" cx="770" cy="340" r="5"/>
  </g>

  <text class="maritime-text" x="790" y="181">Maritime trade</text>
  <text class="maritime-text" x="790" y="199">26.2%</text>
  <text class="supply-text" x="790" y="336">Total supply</text>
  <text class="supply-text" x="790" y="354">20.0%</text>

  <text class="source" x="80" y="468">Source: U.S. EIA, World Oil Transit Chokepoints, Table 1.</text>
</svg>
